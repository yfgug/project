<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; }
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 80px; }
    </style>
    <script>

        function validateForm() {

            var username = document.getElementById("username").value;

            if (username.trim() === "") {
                alert("错误：用户名不能为空！");
                return false; // 阻止表单提交
            }
            return true;
        }
    </script>
</head>
<body>
<h2>用户注册</h2>
<form action="#" method="POST" onsubmit="return validateForm()">

    <div class="form-group">
        <label for="username">用户名：</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名">
    </div>

    <div class="form-group">
        <label for="password">密&nbsp;&nbsp;&nbsp;码：</label>
        <input type="password" id="password" name="password" placeholder="请输入密码">
    </div>

    <div class="form-group">
        <label>性&nbsp;&nbsp;&nbsp;别：</label>
        <input type="radio" id="male" name="gender" value="male" checked>
        <label for="male" style="width: auto;">男</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female" style="width: auto;">女</label>
    </div>

    <div class="form-group">
        <label for="city">城&nbsp;&nbsp;&nbsp;市：</label>
        <select id="city" name="city">
            <option value="beijing">北京</option>
            <option value="shanghai">上海</option>
            <option value="guangzhou">广州</option>
            <option value="shenzhen">深圳</option>
        </select>
    </div>

    <div class="form-group">
        <label>爱&nbsp;&nbsp;&nbsp;好：</label>
        <input type="checkbox" id="hobby1" name="hobby" value="reading">
        <label for="hobby1" style="width: auto;">阅读</label>
        <input type="checkbox" id="hobby2" name="hobby" value="sports">
        <label for="hobby2" style="width: auto;">运动</label>
        <input type="checkbox" id="hobby3" name="hobby" value="music">
        <label for="hobby3" style="width: auto;">音乐</label>
    </div>

    <div class="form-group">
        <input type="submit" value="立即注册">
        <input type="reset" value="重置">
    </div>

</form>
</body>
</html>
