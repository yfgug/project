# Web 服务器配置
server:
  port: 8080
  servlet:
    context-path: /  # 确保上下文路径正确

# Spring 配置
spring:
  servlet:
    multipart:
      max-file-size: 10MB      # 单个文件最大大小
      max-request-size: 20MB   # 整个请求最大大小
      enabled: true
      file-size-threshold: 0
      location:                # 临时文件存储位置
  datasource:
    url: jdbc:mysql://localhost:3306/dormitory_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5

# 文件上传配置
file:
  upload:
    path: ./uploads/  # 上传文件存储路径（相对于项目根目录）
    max-size: 2MB     # 单个文件最大大小限制
    allowed-extensions: jpg,jpeg,png,gif,bmp,webp  # 允许的文件扩展名

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# 日志配置
logging:
  level:
    com.example.dormitory: DEBUG
    org.springframework.web: INFO
  file:
    name: logs/dormitory-system.log  # 日志文件路径
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
