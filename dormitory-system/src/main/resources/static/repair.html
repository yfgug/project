<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧校园 - 宿舍报修管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { margin: 0; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); font-family: 'Noto Sans SC', "Microsoft YaHei", sans-serif; height: 100vh; overflow: hidden; color: #333; }
        #app { display: flex; height: 100vh; padding: 20px; box-sizing: border-box; gap: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); overflow: hidden; }
        .sidebar { width: 240px; display: flex; flex-direction: column; padding: 0; transition: all 0.3s ease; }
        .logo-area { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.3); }
        .logo-area i { font-size: 32px; color: #409EFF; margin-bottom: 10px; }
        .logo-area h2 { margin: 0; font-size: 18px; font-weight: 700; color: #2c3e50; letter-spacing: 1px; }
        .el-menu { background: transparent !important; border-right: none !important; }
        .el-submenu__title, .el-menu-item { color: #505c6a !important; font-weight: 500; border-radius: 10px; margin: 4px 10px; }
        .el-menu-item:hover, .el-submenu__title:hover { background: rgba(255,255,255,0.8) !important; color: #409EFF !important; }
        .el-menu-item.is-active { background: #409EFF !important; color: #fff !important; box-shadow: 0 4px 12px rgba(64,158,255,0.3); }
        .main-wrapper { flex: 1; display: flex; flex-direction: column; gap: 20px; overflow: hidden; }
        .top-header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; flex-shrink: 0; }
        .welcome-text { font-size: 20px; font-weight: bold; color: #2c3e50; }
        .user-profile { display: flex; align-items: center; gap: 15px; }
        .content-area { flex: 1; overflow-y: auto; padding-right: 10px; padding-bottom: 20px; }
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }
        .repair-section { padding: 25px; }
        .section-header { font-size: 18px; font-weight: bold; color: #34495e; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .section-header i { color: #409EFF; font-size: 22px; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .el-table { background: transparent !important; border-radius: 10px; overflow: hidden; }
        .el-table th, .el-table tr { background-color: rgba(255,255,255,0.4) !important; }
        .el-table--striped .el-table__body tr.el-table__row--striped td { background: rgba(255,255,255,0.6) !important; }
        .el-table td, .el-table th.is-leaf { border-bottom: 1px solid rgba(255,255,255,0.5) !important; }
        .el-table--border, .el-table--group { border: 1px solid rgba(255,255,255,0.5) !important; }
        .pagination-container { margin-top: 25px; display: flex; justify-content: center; padding-bottom: 10px; }
        .el-dialog { border-radius: 16px !important; overflow: hidden; }
        .el-dialog__header { background: #f8f9fa; border-bottom: 1px solid #ebeef5; }
        .action-buttons { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: nowrap; }
    </style>
</head>
<body>
<div id="app">
    <div class="sidebar glass-card">
        <div class="logo-area">
            <i class="el-icon-school"></i>
            <h2>智慧校园管理</h2>
            <div style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">Business Platform v2.0</div>
        </div>
        <el-menu default-active="3-2" class="el-menu-vertical-demo" :unique-opened="true">
            <el-submenu index="2">
                <template slot="title"><i class="el-icon-user"></i><span>人员信息管理</span></template>
                <el-menu-item index="2-1" @click="goTo('student.html')">学生管理</el-menu-item>
            </el-submenu>
            <el-submenu index="3">
                <template slot="title"><i class="el-icon-office-building"></i><span>宿舍与报修</span></template>
                <el-menu-item index="3-2" @click="goTo('repair.html')">宿舍报修处理</el-menu-item>
            </el-submenu>
            <el-submenu index="4">
                <template slot="title"><i class="el-icon-data-line"></i><span>考勤与水电</span></template>
                <el-menu-item index="4-1" @click="goTo('inspection.html')">查寝与违纪</el-menu-item>
                <el-menu-item index="4-2" @click="goTo('utility.html')">宿舍水电费</el-menu-item>
            </el-submenu>
            <el-menu-item index="5" @click="goTo('notice.html')">
                <i class="el-icon-chat-dot-square"></i><span slot="title">系统公告发布</span>
            </el-menu-item>
        </el-menu>
    </div>
    <div class="main-wrapper">
        <div class="top-header glass-card">
            <div class="welcome-text">宿舍设备维修管理</div>
            <div class="user-profile">
                <span style="font-size: 14px; color: #555;">当前身份：
                    <el-tag size="medium" :type="role === 'admin' ? 'danger' : 'success'" effect="light" style="border-radius: 20px;">
                        <i :class="role === 'admin' ? 'el-icon-s-custom' : 'el-icon-user'"></i>
                        {{ role === 'admin' ? '系统管理员' : '普通学生' }}
                    </el-tag>
                </span>
                <el-button type="danger" size="small" round plain @click="logout" icon="el-icon-switch-button">退出</el-button>
            </div>
        </div>
        <div class="content-area">
            <div class="repair-section glass-card">
                <div class="section-header">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i class="el-icon-setting"></i> 宿舍设备维修工单
                    </div>
                    <el-button v-if="role === 'student'" type="warning" round icon="el-icon-service" @click="openCreateDialog">填写维修工单</el-button>
                </div>
                <div class="toolbar">
                    <div style="display: flex; gap: 10px;">
                        <el-input placeholder="按宿舍号、设备、报修人搜索" prefix-icon="el-icon-search" v-model="searchKeyword" style="width: 300px;" clearable @clear="handleSearch" @keyup.enter.native="handleSearch"></el-input>
                        <el-button type="primary" round @click="handleSearch">搜索</el-button>
                    </div>
                    <el-button type="default" round icon="el-icon-refresh-right" @click="refreshData">刷新列表</el-button>
                </div>
                <el-table :data="pagedData" border stripe v-loading="loading" style="width: 100%;">
                    <el-table-column label="序号" width="70" align="center">
                        <template slot-scope="scope">{{ (currentPage - 1) * pageSize + scope.$index + 1 }}</template>
                    </el-table-column>
                    <el-table-column prop="dormId" label="宿舍号" width="120" align="center"></el-table-column>
                    <el-table-column prop="device" label="故障设备" width="150" align="center"></el-table-column>
                    <el-table-column prop="description" label="详细描述"></el-table-column>
                    <el-table-column prop="stuName" label="报修人" width="100" align="center"></el-table-column>
                    <el-table-column prop="submitDate" label="申报时间" width="120" align="center"></el-table-column>
                    <el-table-column prop="status" label="处理状态" width="100" align="center">
                        <template slot-scope="scope">
                            <el-tag :type="normalizeStatus(scope.row.status) === '待处理' ? 'danger' : 'success'">{{ normalizeStatus(scope.row.status) }}</el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column v-if="role === 'admin'" label="后勤操作" align="center" width="180">
                        <template slot-scope="scope">
                            <div class="action-buttons">
                                <el-button :disabled="normalizeStatus(scope.row.status) === '已解决'" size="mini" type="primary" @click="handleResolve(scope.row.id)">解决</el-button>
                                <el-button size="mini" type="danger" @click="handleDelete(scope.row.id)" plain>删除</el-button>
                            </div>
                        </template>
                    </el-table-column>
                </el-table>
                <div class="pagination-container">
                    <el-pagination background @size-change="handleSizeChange" @current-change="handleCurrentChange" :current-page="currentPage" :page-sizes="[8, 12, 20, 30]" :page-size="pageSize" layout="total, sizes, prev, pager, next, jumper" :total="filteredTotal"></el-pagination>
                </div>
            </div>
        </div>
    </div>
    <el-dialog title="提交宿舍维修申请" :visible.sync="dialogVisible" width="35%" center>
        <el-form :model="form" :rules="rules" ref="repairForm" label-width="80px">
            <el-form-item label="宿舍号" prop="dormId"><el-input v-model="form.dormId" placeholder="如 16栋 113"></el-input></el-form-item>
            <el-form-item label="故障设备" prop="device">
                <el-select v-model="form.device" style="width: 100%;">
                    <el-option label="空调故障" value="空调故障"></el-option>
                    <el-option label="水管故障" value="水管故障"></el-option>
                    <el-option label="电路故障" value="电路故障"></el-option>
                    <el-option label="家具损坏" value="家具损坏"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="报修人" prop="stuName"><el-input v-model="form.stuName"></el-input></el-form-item>
            <el-form-item label="详细描述" prop="description"><el-input type="textarea" :rows="3" v-model="form.description"></el-input></el-form-item>
        </el-form>
        <span slot="footer">
            <el-button round @click="dialogVisible = false">取消</el-button>
            <el-button type="warning" round :loading="submitting" @click="saveData">提交申请</el-button>
        </span>
    </el-dialog>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
new Vue({
    el: '#app',
    data: {
        role: '',
        tableData: [],
        loading: false,
        dialogVisible: false,
        submitting: false,
        form: { dormId: '', device: '', stuName: localStorage.getItem('username') || '', description: '' },
        searchKeyword: '',
        currentPage: 1,
        pageSize: 10,
        rules: {
            dormId: [{ required: true, message: '请输入宿舍号', trigger: 'blur' }],
            device: [{ required: true, message: '请选择故障设备', trigger: 'change' }],
            stuName: [{ required: true, message: '请输入报修人', trigger: 'blur' }],
            description: [{ required: true, message: '请输入详细描述', trigger: 'blur' }]
        }
    },
    computed: {
        filteredData() {
            if (!this.searchKeyword.trim()) return this.tableData;
            const keyword = this.searchKeyword.trim().toLowerCase();
            return this.tableData.filter(item =>
                String(item.dormId || '').toLowerCase().includes(keyword) ||
                String(item.device || '').toLowerCase().includes(keyword) ||
                String(item.stuName || '').toLowerCase().includes(keyword) ||
                String(item.description || '').toLowerCase().includes(keyword)
            );
        },
        filteredTotal() { return this.filteredData.length; },
        pagedData() {
            const start = (this.currentPage - 1) * this.pageSize;
            return this.filteredData.slice(start, start + this.pageSize);
        }
    },
    watch: { searchKeyword() { this.currentPage = 1; } },
    mounted() {
        this.role = localStorage.getItem('userRole') || 'student';
        this.loadData();
    },
    methods: {
        goTo(url) { location.href = url; },
        logout() {
            localStorage.removeItem('userRole');
            localStorage.removeItem('username');
            this.$message.success('已安全退出');
            setTimeout(() => { location.href = 'login.html'; }, 800);
        },
        normalizeStatus(status) {
            return status && status.indexOf('已') !== -1 ? '已解决' : '待处理';
        },
        loadData() {
            this.loading = true;
            axios.get('/api/repair/list').then(res => {
                this.tableData = res.data.data || [];
                this.currentPage = 1;
            }).catch(() => {
                this.$message.error('获取报修列表失败，请检查后端服务');
            }).finally(() => {
                this.loading = false;
            });
        },
        refreshData() {
            this.searchKeyword = '';
            this.loadData();
        },
        handleSearch() { this.currentPage = 1; },
        handleSizeChange(val) { this.pageSize = val; this.currentPage = 1; },
        handleCurrentChange(val) { this.currentPage = val; },
        openCreateDialog() {
            this.form = { dormId: '', device: '', stuName: localStorage.getItem('username') || '', description: '' };
            this.dialogVisible = true;
            this.$nextTick(() => { this.$refs.repairForm && this.$refs.repairForm.clearValidate(); });
        },
        saveData() {
            this.$refs.repairForm.validate(valid => {
                if (!valid) return;
                this.submitting = true;
                const payload = Object.assign({}, this.form, { submitDate: this.today() });
                axios.post('/api/repair/add', payload).then(res => {
                    if (res.data.code === 200) {
                        this.$message.success('工单提交成功，等待后勤处理');
                        this.dialogVisible = false;
                        this.form = { dormId: '', device: '', stuName: localStorage.getItem('username') || '', description: '' };
                        this.loadData();
                    } else {
                        this.$message.error(res.data.msg || '提交失败');
                    }
                }).catch(() => {
                    this.$message.error('提交失败，请稍后重试');
                }).finally(() => {
                    this.submitting = false;
                });
            });
        },
        handleResolve(id) {
            axios.post('/api/repair/resolve/' + id).then(res => {
                if (res.data.code === 200) {
                    this.$message.success('维修已完成');
                    this.loadData();
                } else {
                    this.$message.error(res.data.msg || '操作失败');
                }
            }).catch(() => {
                this.$message.error('操作失败，请重试');
            });
        },
        handleDelete(id) {
            this.$confirm('归档后将不可恢复，是否继续?', '提示', { type: 'warning' }).then(() => {
                axios.delete('/api/repair/delete/' + id).then(res => {
                    if (res.data.code === 200) {
                        this.$message.success('归档成功');
                        this.loadData();
                    } else {
                        this.$message.error(res.data.msg || '删除失败');
                    }
                }).catch(() => {
                    this.$message.error('删除失败，请重试');
                });
            }).catch(() => {});
        },
        today() {
            const d = new Date();
            const pad = v => String(v).padStart(2, '0');
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
        }
    }
});
</script>
</body>
</html>
