<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧校园 - 登录</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #d7e1ff 0%, #f7d7ff 100%); font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif; }
        .login-shell { width: min(920px, 92vw); min-height: 520px; display: grid; grid-template-columns: 1.1fr 0.9fr; background: rgba(255, 255, 255, 0.72); backdrop-filter: blur(16px); border-radius: 28px; overflow: hidden; box-shadow: 0 24px 60px rgba(70, 84, 170, 0.18); }
        .brand-panel { padding: 48px; color: #23345d; background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0) 42%), linear-gradient(160deg, rgba(95, 140, 255, 0.24), rgba(255, 167, 198, 0.22)); display: flex; flex-direction: column; justify-content: space-between; }
        .brand-mark { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg, #4f86ff, #7fb5ff); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 12px 24px rgba(79, 134, 255, 0.28); }
        .brand-panel h1 { margin: 20px 0 12px; font-size: 34px; line-height: 1.25; }
        .brand-panel p { margin: 0; color: #55627f; line-height: 1.8; }
        .tips { margin-top: 28px; padding: 18px 20px; border-radius: 18px; background: rgba(255, 255, 255, 0.56); color: #41506d; }
        .tips strong { color: #2b3e68; }
        .form-panel { padding: 52px 40px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.82); }
        .form-box { width: min(360px, 100%); }
        .form-box h2 { margin: 0 0 10px; color: #24324b; font-size: 28px; }
        .form-box .sub { margin: 0 0 28px; color: #6b778c; }
        .el-input__inner { height: 44px; border-radius: 12px !important; }
        .login-btn { width: 100%; height: 46px; border-radius: 14px !important; background: linear-gradient(135deg, #4f86ff, #6ea3ff) !important; border: none !important; box-shadow: 0 12px 24px rgba(79, 134, 255, 0.25); }
        @media (max-width: 820px) { .login-shell { grid-template-columns: 1fr; } .brand-panel { padding: 34px 28px 24px; } .form-panel { padding: 30px 24px 36px; } }
    </style>
</head>
<body>
<div id="app">
    <div class="login-shell">
        <section class="brand-panel">
            <div>
                <div class="brand-mark"><i class="el-icon-school"></i></div>
                <h1>智慧校园宿舍管理平台</h1>
                <p>用于学生住宿信息、维修工单、公告发布与宿舍检查等日常事务管理。</p>
                <div class="tips">
                    <div><strong>统一登录入口</strong></div>
                    <div style="margin-top: 8px;">请输入已分配的账号和密码进入系统。</div>
                </div>
            </div>
            <p>登录成功后将根据账号角色进入系统主页。</p>
        </section>
        <section class="form-panel">
            <div class="form-box">
                <h2>账号登录</h2>
                <p class="sub">请输入账号和密码</p>
                <el-form :model="form">
                    <el-form-item><el-input v-model="form.username" prefix-icon="el-icon-user" placeholder="请输入账号"></el-input></el-form-item>
                    <el-form-item><el-input v-model="form.password" prefix-icon="el-icon-lock" type="password" placeholder="请输入密码" @keyup.enter.native="handleLogin"></el-input></el-form-item>
                    <el-button class="login-btn" type="primary" :loading="loading" @click="handleLogin">登录</el-button>
                </el-form>
            </div>
        </section>
    </div>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
    new Vue({
        el: '#app',
        data: { form: { username: '', password: '' }, loading: false },
        methods: {
            handleLogin() {
                if (!this.form.username || !this.form.password) {
                    this.$message.warning('账号和密码不能为空');
                    return;
                }
                this.loading = true;
                axios.post('/api/student/login', this.form).then(res => {
                    if (res.data.code === 200 && res.data.data && res.data.data.role) {
                        localStorage.setItem('userRole', res.data.data.role);
                        localStorage.setItem('username', res.data.data.username || this.form.username);
                        this.$message.success('登录成功');
                        setTimeout(() => { location.href = 'student.html'; }, 600);
                    } else {
                        this.$message.error(res.data.msg || '登录失败');
                    }
                }).catch(error => {
                    console.error('登录失败', error);
                    this.$message.error('网络异常，请稍后重试');
                }).finally(() => {
                    this.loading = false;
                });
            }
        }
    });
</script>
</body>
</html>
