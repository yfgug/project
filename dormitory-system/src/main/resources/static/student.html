<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>智慧校园 - 学生管理</title><link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css"><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');body{margin:0;background:linear-gradient(135deg,#e0c3fc 0%,#8ec5fc 100%);font-family:'Noto Sans SC','Microsoft YaHei',sans-serif;height:100vh;overflow:hidden;color:#333}#app{display:flex;height:100vh;padding:20px;box-sizing:border-box;gap:20px}.glass-card{background:rgba(255,255,255,.65);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.5);border-radius:20px;box-shadow:0 8px 32px rgba(31,38,135,.05);overflow:hidden}.sidebar{width:240px;display:flex;flex-direction:column}.logo-area{padding:30px 20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.3)}.logo-area i{font-size:32px;color:#409EFF}.logo-area h2{margin:8px 0 0;font-size:18px;font-weight:700;color:#2c3e50}.el-menu{background:transparent!important;border-right:none!important}.el-submenu__title,.el-menu-item{color:#505c6a!important;font-weight:500;border-radius:10px;margin:4px 10px}.el-menu-item:hover,.el-submenu__title:hover{background:rgba(255,255,255,.8)!important;color:#409EFF!important}.el-menu-item.is-active{background:#409EFF!important;color:#fff!important;box-shadow:0 4px 12px rgba(64,158,255,.3)}.main-wrapper{flex:1;display:flex;flex-direction:column;gap:20px;overflow:hidden}.top-header{height:70px;display:flex;justify-content:space-between;align-items:center;padding:0 30px;flex-shrink:0}.welcome-text{font-size:20px;font-weight:700;color:#2c3e50}.user-profile{display:flex;align-items:center;gap:15px}.content-area{flex:1;overflow-y:auto;padding-right:10px;padding-bottom:20px}.content-area::-webkit-scrollbar{width:6px}.content-area::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:10px}.dashboard-row{display:flex;gap:20px;margin-bottom:20px}.chart-box{flex:1;padding:20px}.chart-header{font-size:15px;font-weight:700;color:#34495e;margin-bottom:15px;display:flex;align-items:center;gap:8px}.chart-div{height:240px}.table-section{padding:25px}.advanced-search{background:rgba(255,255,255,.4);border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,.3)}.search-title{font-size:16px;font-weight:700;color:#409EFF;margin-bottom:15px}.search-row,.toolbar,.batch-actions{display:flex;flex-wrap:wrap;gap:12px;align-items:center}.toolbar{justify-content:space-between;margin-bottom:20px}.batch-info{font-size:14px;color:#409EFF;font-weight:500}.el-table{background:transparent!important;border-radius:10px;overflow:hidden}.el-table th,.el-table tr{background-color:rgba(255,255,255,.4)!important}.el-table--striped .el-table__body tr.el-table__row--striped td{background:rgba(255,255,255,.6)!important}.el-table td,.el-table th.is-leaf{border-bottom:1px solid rgba(255,255,255,.5)!important}.pagination-container{margin-top:25px;display:flex;justify-content:center}.avatar{width:50px;height:50px;border-radius:50%;object-fit:cover}.uploader .el-upload{border:1px dashed #d9d9d9;border-radius:6px}.uploader i{font-size:28px;color:#8c939d;width:100px;height:100px;line-height:100px;text-align:center}.preview{width:100px;height:100px;object-fit:cover}.el-dialog{border-radius:16px!important}@media(max-width:900px){#app,.dashboard-row{flex-direction:column}.sidebar{width:100%}.top-header{height:auto;padding:20px;flex-direction:column;align-items:flex-start;gap:12px}}</style></head><body><div id="app"><div class="sidebar glass-card"><div class="logo-area"><i class="el-icon-school"></i><h2>智慧校园管理</h2><div style="font-size:12px;color:#7f8c8d;margin-top:5px">Business Platform v2.0</div></div><el-menu default-active="2-1" :unique-opened="true"><el-submenu index="2"><template slot="title"><i class="el-icon-user"></i><span>人员信息管理</span></template><el-menu-item index="2-1" @click="goTo('student.html')">学生管理</el-menu-item></el-submenu><el-submenu index="3"><template slot="title"><i class="el-icon-office-building"></i><span>宿舍与报修</span></template><el-menu-item index="3-2" @click="goTo('repair.html')">宿舍报修处理</el-menu-item></el-submenu><el-submenu index="4"><template slot="title"><i class="el-icon-data-line"></i><span>考勤与水电</span></template><el-menu-item index="4-1" @click="goTo('inspection.html')">查寝与违纪</el-menu-item><el-menu-item index="4-2" @click="goTo('utility.html')">宿舍水电费</el-menu-item></el-submenu><el-menu-item index="5" @click="goTo('notice.html')"><i class="el-icon-chat-dot-square"></i><span slot="title">系统公告发布</span></el-menu-item></el-menu></div><div class="main-wrapper"><div class="top-header glass-card"><div class="welcome-text">学生信息管理系统</div><div class="user-profile"><span style="font-size:14px;color:#555">当前身份：<el-tag size="medium" :type="role==='admin'?'danger':'success'" effect="light" style="border-radius:20px"><i :class="role==='admin'?'el-icon-s-custom':'el-icon-user'"></i>{{role==='admin'?'系统管理员':'普通学生'}}</el-tag></span><el-button type="danger" size="small" round plain @click="logout" icon="el-icon-switch-button">退出</el-button></div></div><div class="content-area"><div class="dashboard-row"><div class="chart-box glass-card"><div class="chart-header"><i class="el-icon-pie-chart"></i>实时入住性别比例分析</div><div id="genderChart" class="chart-div"></div></div><div class="chart-box glass-card"><div class="chart-header"><i class="el-icon-data-analysis"></i>各宿舍入住人数排行（Top 10）</div><div id="dormChart" class="chart-div"></div></div></div><div class="table-section glass-card"><div class="advanced-search"><div class="search-title"><i class="el-icon-search"></i>高级组合搜索</div><div class="search-row"><el-input v-model="searchParams.name" placeholder="输入学生姓名" style="width:180px" clearable></el-input><el-select v-model="searchParams.gender" placeholder="选择性别" style="width:120px" clearable><el-option label="男" value="男"></el-option><el-option label="女" value="女"></el-option></el-select><el-input v-model="searchParams.dormId" placeholder="输入宿舍号或楼栋" style="width:180px" clearable></el-input><el-date-picker v-model="searchParams.dateRange" type="daterange" range-separator="至" start-placeholder="开始日期" end-placeholder="结束日期" value-format="yyyy-MM-dd" style="width:320px"></el-date-picker><el-button type="primary" @click="search" icon="el-icon-search">搜索</el-button><el-button @click="resetSearch" icon="el-icon-refresh">重置</el-button></div></div><div class="toolbar"><div class="batch-actions"><span class="batch-info" v-if="selectedStudents.length">已选择 {{selectedStudents.length}} 名学生</span><el-button v-if="selectedStudents.length&&role==='admin'" type="danger" round plain icon="el-icon-delete" @click="handleBatchDelete">批量删除</el-button><el-button v-if="selectedStudents.length" type="warning" round plain icon="el-icon-download" @click="handleBatchExport">批量导出</el-button></div><div style="display:flex;gap:10px"><el-button v-if="role==='admin'" type="warning" round plain icon="el-icon-download" @click="handleExportAll">导出全部</el-button><el-button v-if="role==='admin'" type="success" round icon="el-icon-plus" @click="handleAdd">办理新生入住</el-button></div></div><el-table :data="pagedTableData" border stripe v-loading="loading" @selection-change="handleSelectionChange"><el-table-column type="selection" width="55" align="center"></el-table-column><el-table-column type="index" :index="indexMethod" label="序号" width="70" align="center"></el-table-column><el-table-column label="照片" width="100" align="center"><template slot-scope="scope"><el-image :src="scope.row.photoUrl||defaultAvatar" :preview-src-list="[scope.row.photoUrl||defaultAvatar]" fit="cover" style="width:50px;height:50px;border-radius:50%"><div slot="error"><img class="avatar" :src="defaultAvatar" alt="avatar"></div></el-image></template></el-table-column><el-table-column prop="stuNum" label="学号" align="center" min-width="120"></el-table-column><el-table-column prop="name" label="姓名" align="center" min-width="100"></el-table-column><el-table-column prop="gender" label="性别" width="90" align="center"><template slot-scope="scope"><el-tag size="small" :type="scope.row.gender==='女'?'danger':''" effect="dark" style="border-radius:12px">{{scope.row.gender}}</el-tag></template></el-table-column><el-table-column prop="phone" label="联系电话" align="center" min-width="130"></el-table-column><el-table-column prop="dormId" label="分配宿舍" align="center" min-width="150"><template slot-scope="scope"><i class="el-icon-house" style="color:#909399"></i> {{scope.row.dormId}}</template></el-table-column><el-table-column prop="checkInDate" label="入住时间" align="center" min-width="120"></el-table-column><el-table-column v-if="role==='admin'" label="操作" align="center" width="150" fixed="right"><template slot-scope="scope"><el-button size="mini" type="primary" icon="el-icon-edit" circle plain @click="handleEdit(scope.row)"></el-button><el-button size="mini" type="danger" icon="el-icon-delete" circle plain @click="handleDelete(scope.row.id)"></el-button></template></el-table-column></el-table><div class="pagination-container"><el-pagination background @size-change="s=>{pagination.pageSize=s;pagination.currentPage=1}" @current-change="v=>pagination.currentPage=v" :current-page.sync="pagination.currentPage" :page-sizes="[5,10,20]" :page-size="pagination.pageSize" layout="total, sizes, prev, pager, next, jumper" :total="tableData.length"></el-pagination></div></div></div></div><el-dialog :title="dialogTitle" :visible.sync="dialogVisible" width="620px" @close="resetForm"><el-form ref="studentForm" :model="form" :rules="rules" label-width="90px"><el-form-item label="学号" prop="stuNum"><el-input v-model="form.stuNum"></el-input></el-form-item><el-form-item label="姓名" prop="name"><el-input v-model="form.name"></el-input></el-form-item><el-form-item label="性别" prop="gender"><el-radio-group v-model="form.gender"><el-radio label="男">男</el-radio><el-radio label="女">女</el-radio></el-radio-group></el-form-item><el-form-item label="电话" prop="phone"><el-input v-model="form.phone"></el-input></el-form-item><el-form-item label="宿舍号" prop="dormId"><el-input v-model="form.dormId"></el-input></el-form-item><el-form-item label="入住日期" prop="checkInDate"><el-date-picker v-model="form.checkInDate" type="date" value-format="yyyy-MM-dd" placeholder="选择入住日期" style="width:100%"></el-date-picker></el-form-item><el-form-item label="头像"><div class="uploader"><el-upload action="/api/upload/avatar" :show-file-list="false" :on-success="handleAvatarSuccess" :before-upload="beforeAvatarUpload"><img v-if="form.photoUrl" :src="form.photoUrl" class="preview" alt="avatar"><i v-else class="el-icon-plus"></i></el-upload></div></el-form-item></el-form><span slot="footer"><el-button @click="dialogVisible=false">取消</el-button><el-button type="primary" :loading="submitting" @click="saveData">保存</el-button></span></el-dialog></div><script src="https://unpkg.com/vue@2/dist/vue.js"></script><script src="https://unpkg.com/element-ui/lib/index.js"></script><script src="https://unpkg.com/axios/dist/axios.min.js"></script><script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script><script>new Vue({el:'#app',data:{role:'',searchParams:{name:'',gender:'',dormId:'',dateRange:[]},tableData:[],loading:false,dialogVisible:false,dialogTitle:'',form:{},submitting:false,selectedStudents:[],pagination:{currentPage:1,pageSize:10},genderChart:null,dormChart:null,defaultAvatar:'https://cube.elemecdn.com/0/88/03b0d39583f48206768a7534e55bcpng.png',rules:{stuNum:[{required:true,message:'请输入学号',trigger:'blur'}],name:[{required:true,message:'请输入姓名',trigger:'blur'}],gender:[{required:true,message:'请选择性别',trigger:'change'}],phone:[{required:true,message:'请输入电话',trigger:'blur'}],dormId:[{required:true,message:'请输入宿舍号',trigger:'blur'}],checkInDate:[{required:true,message:'请选择入住日期',trigger:'change'}]}},computed:{pagedTableData(){let s=(this.pagination.currentPage-1)*this.pagination.pageSize;return this.tableData.slice(s,s+this.pagination.pageSize)}},mounted(){this.role=localStorage.getItem('userRole');if(!this.role){this.$message.error('请先登录');setTimeout(()=>location.href='login.html',800);return}this.genderChart=echarts.init(document.getElementById('genderChart'));this.dormChart=echarts.init(document.getElementById('dormChart'));this.loadData();window.addEventListener('resize',this.resizeCharts)},beforeDestroy(){window.removeEventListener('resize',this.resizeCharts)},methods:{goTo(u){location.href=u},logout(){localStorage.removeItem('userRole');localStorage.removeItem('username');this.$message.success('已安全退出');setTimeout(()=>location.href='login.html',800)},resizeCharts(){this.genderChart&&this.genderChart.resize();this.dormChart&&this.dormChart.resize()},indexMethod(i){return (this.pagination.currentPage-1)*this.pagination.pageSize+i+1},search(){this.pagination.currentPage=1;this.loadData()},resetSearch(){this.searchParams={name:'',gender:'',dormId:'',dateRange:[]};this.search()},loadData(){this.loading=true;let p={name:this.searchParams.name,gender:this.searchParams.gender,dormId:this.searchParams.dormId};if(this.searchParams.dateRange.length===2){p.startDate=this.searchParams.dateRange[0];p.endDate=this.searchParams.dateRange[1]}axios.get('/api/student/list',{params:p}).then(r=>{this.tableData=r.data.data||[];this.updateCharts()}).catch(()=>this.$message.error('网络异常或后端未启动')).finally(()=>this.loading=false)},updateCharts(){if(!this.tableData.length){this.genderChart.setOption({title:{text:'暂无数据',left:'center',top:'center',textStyle:{color:'#999',fontSize:14}},series:[{type:'pie',data:[]}]});this.dormChart.setOption({title:{text:'暂无数据',left:'center',top:'center',textStyle:{color:'#999',fontSize:14}},xAxis:{type:'category',data:[]},yAxis:{type:'value'},series:[{type:'bar',data:[]}]});return}let g={'男':0,'女':0},m=new Map();this.tableData.forEach(i=>{if(g[i.gender]!=null)g[i.gender]++;let d=i.dormId||'未分配';m.set(d,(m.get(d)||0)+1)});this.genderChart.setOption({title:{show:false},tooltip:{trigger:'item',formatter:'{b}: {c}人 ({d}%)'},legend:{orient:'vertical',left:'left'},color:['#409EFF','#F56C6C'],series:[{type:'pie',radius:['40%','70%'],data:[{value:g['男'],name:'男生'},{value:g['女'],name:'女生'}]}]});let ds=Array.from(m).map(i=>({dormId:i[0],count:i[1]})).sort((a,b)=>b.count-a.count).slice(0,10);this.dormChart.setOption({title:{show:false},tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},grid:{top:20,bottom:50,left:'3%',right:'4%',containLabel:true},xAxis:{type:'category',data:ds.map(i=>i.dormId),axisLabel:{interval:0,rotate:30}},yAxis:{type:'value',minInterval:1},series:[{type:'bar',barWidth:'35%',data:ds.map(i=>i.count),itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#8ec5fc'},{offset:1,color:'#e0c3fc'}]),barBorderRadius:[6,6,0,0]}}]})},handleSelectionChange(v){this.selectedStudents=v},handleBatchDelete(){if(!this.selectedStudents.length)return this.$message.warning('请先选择要删除的学生');let ids=this.selectedStudents.map(i=>i.id);this.$confirm(`确定删除选中的 ${ids.length} 名学生吗？`,'提示',{type:'warning'}).then(()=>axios.post('/api/student/delete/batch',ids)).then(r=>{if(r.data.code===200){this.$message.success('批量删除成功');this.selectedStudents=[];this.loadData()}else this.$message.error(r.data.msg)}).catch(()=>{})},csv(data,name){let h=['学号','姓名','性别','联系电话','宿舍号','入住时间','照片'];let rows=data.map(i=>[i.stuNum||'',i.name||'',i.gender||'',i.phone||'',i.dormId||'',i.checkInDate||'',i.photoUrl||'']);let csv=[h].concat(rows).map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');let b=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);this.$message.success('导出成功')},handleBatchExport(){if(!this.selectedStudents.length)return this.$message.warning('请先选择要导出的学生');this.csv(this.selectedStudents,`selected-students-${new Date().toISOString().split('T')[0]}.csv`)},handleExportAll(){if(!this.tableData.length)return this.$message.warning('暂无数据可导出');this.csv(this.tableData,`all-students-${new Date().toISOString().split('T')[0]}.csv`)},handleAvatarSuccess(r){if(r&&r.code===200){this.form.photoUrl=r.data;this.$message.success('照片上传成功')}else this.$message.error(r&&r.msg?r.msg:'照片上传失败')},beforeAvatarUpload(f){let ok=['image/jpeg','image/png','image/gif','image/bmp','image/webp'].includes(f.type),lt=f.size/1024/1024<2;if(!ok){this.$message.error('仅支持图片格式');return false}if(!lt){this.$message.error('上传图片大小不能超过 2MB');return false}return true},handleAdd(){this.dialogTitle='办理新生入住';this.form={stuNum:'',name:'',gender:'男',phone:'',dormId:'',checkInDate:new Date().toISOString().split('T')[0],photoUrl:''};this.dialogVisible=true;this.$nextTick(()=>this.$refs.studentForm&&this.$refs.studentForm.clearValidate())},handleEdit(r){this.dialogTitle='修改入住信息';this.form=JSON.parse(JSON.stringify(r));this.dialogVisible=true;this.$nextTick(()=>this.$refs.studentForm&&this.$refs.studentForm.clearValidate())},saveData(){this.$refs.studentForm.validate(v=>{if(!v)return;this.submitting=true;axios({method:this.form.id?'put':'post',url:this.form.id?'/api/student/update':'/api/student/add',data:this.form}).then(r=>{if(r.data.code===200){this.$message.success('操作成功');this.dialogVisible=false;this.loadData()}else this.$message.error(r.data.msg)}).catch(()=>this.$message.error('系统异常，请检查后端日志')).finally(()=>this.submitting=false)})},handleDelete(id){this.$confirm('此操作将删除该学生档案，是否继续？','系统警告',{type:'warning'}).then(()=>axios.delete('/api/student/delete/'+id)).then(r=>{if(r.data.code===200){this.$message.success('删除成功');this.loadData()}else this.$message.error(r.data.msg)}).catch(()=>{})},resetForm(){this.$refs.studentForm&&this.$refs.studentForm.resetFields()}}})</script></body></html>
